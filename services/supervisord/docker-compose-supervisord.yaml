x-supervisord: &supervisord
  build:
    context: ../..
    dockerfile: services/supervisord/Dockerfile.supervisord

  container_name: supervisord
  restart: unless-stopped
  volumes:
    - ../../src:/app/src:ro
    - ../../.docker/data/services/supervisord:/app/data:rw
    - ../../services/supervisord/supervisord.conf:/etc/supervisor/supervisord.conf:ro
    - ./conf.d:/etc/supervisor/conf.d:ro
  environment:
    - PYTHONUNBUFFERED=1
    - SUPERVISORD_USERNAME=admin
    - SUPERVISORD_PASSWORD=localai
    - TZ=UTC
  labels:
    traefik.enable: true
    traefik.http.routers.supervisord.rule: Host(`supervisord.localhost`)
    traefik.http.routers.supervisord.entrypoints: web, websecure
    traefik.http.services.supervisord.loadbalancer.server.port: 9001
    traefik.http.services.supervisord.loadbalancer.passhostheader: true
services:
  supervisord:
    <<: *supervisord
